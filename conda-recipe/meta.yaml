package:
  name: proc-tree
  version: 0.1.0

source:
  path: ..

build:
  number: 0
  # script: call bld.bat # [win]
  # script: call build.sh # [linux]


requirements:
  build:
    - cmake
    - ninja
    - {{ compiler('cxx') }} # [linux]

  host:
    - libstdcxx-ng # [linux]
    - fmt
    - nlohmann_json

  run:
    - fmt
    - nlohmann_json
    - libstdcxx-ng # [linux]

test:
  commands:
    - proc-tree || true
    - proc-tree --help || true

about:
  home: https://github.com/afiryulin/conda-pkg-proc-tree
  summary: A C++ library that prints for process tree.
  license: MIT