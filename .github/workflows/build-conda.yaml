name: Build Conda Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-conda:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-64
          - os: windows-latest
            artifact_name: win-64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup rattler-build
        shell: bash
        run: |
          curl -fsSL https://prefix.dev | bash
          echo "$HOME/.rattler-build/bin" >> $GITHUB_PATH

      - name: Build Conda Package
        run: |
          rattler-build build --recipe conda-recipe/recipe.yaml --output-dir dist

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: proc-tree-${{ matrix.artifact_name }}
          path: |
            dist/**/*.conda
            dist/**/*.tar.bz2
          if-no-files-found: error
          retention-days: 7


