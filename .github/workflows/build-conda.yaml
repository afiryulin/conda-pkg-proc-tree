name: Build Conda Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-conda:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-64
          - os: windows-latest
            artifact_name: win-64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Conda packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/conda_cache_dir
          key: ${{ runner.os }}-conda-${{ steps.get-date.outputs.date }}-${{ hashFiles('conda-recipe/environment.yaml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ steps.get-date.outputs.date }}-

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3.3.0
        with:
          activate-environment: conda_cache
          environment-file: conda-recipe/environment.yaml
          pkgs-dirs: ${{ github.workspace }}/conda_cache_dir
          use-only-tar-bz2: true
          miniforge-variant: Miniforge3
          auto-activate: true
          conda-remove-defaults: true
          channels: conda-forge
          use-mamba: true

      - name: Install Build Tools
        shell: bash -el {0}
        run: |
            conda install -y conda-build anaconda-client boa -c conda-forge

      - name: Build Conda Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash -el {0}
        run: |
            conda mambabuild conda-recipe --output-folder dist -c conda-forge --no-test

      - name: Build Conda Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash -el {0}
        run: |
            conda conda-build conda-recipe --output-folder dist -c conda-forge --no-test


      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: proc-tree-${{ matrix.artifact_name }}
          path: |
            dist/**/*.conda
            dist/**/*.tar.bz2
          if-no-files-found: error
          retention-days: 7


