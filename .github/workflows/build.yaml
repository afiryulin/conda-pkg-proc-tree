name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-64
          - os: windows-latest
            artifact_name: win-64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake

      - name: Configure CMake
        run: cmake -S . -B ${{github.workspace}}/build -G Ninja

      - name: Build
        run: |
          cmake --build ${{github.workspace}}/build -j$(nproc)