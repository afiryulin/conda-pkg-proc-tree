name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-64
            shell: bash el {0}
          - os: windows-latest
            artifact_name: win-64
            shell: pwsh


    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3.3.0
        with:
          miniforge-variant: Miniforge3
          auto-activate: true
          conda-remove-defaults: true
          channels: conda-forge

      - name: Install Build Tools
        shell: bash -el {0}
        run: |
            conda install -y conda-build anaconda-client boa -c conda-forge

      - name: Build Conda Package
        shell: ${{ matrix.shell }}
        run: |
            conda mambabuild conda-recipe --output-folder dist -c conda-forge --no-test

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: proc-tree-${{ matrix.artifact_name }}
          path: |
            dist/**/*.conda
            dist/**/*.tar.bz2
          if-no-files-found: error
          retention-days: 7


