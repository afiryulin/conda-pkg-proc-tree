name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-64
          - os: windows-latest
            artifact_name: win-64

    runs-on: ${{ matrix.os }}
    env:
      VCPKG_TOOLCHAIN: ${{ matrix.os == 'windows-latest' && format('-DCMAKE_TOOLCHAIN_FILE={0}/scripts/buildsystems/vcpkg.cmake', env.VCPKG_INSTALLATION_ROOT) || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake libfmt-dev nlohmann-json3-dev

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install fmt nlohmann-json

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: bash
        run: |
          run: cmake -S . -B build -G Ninja ${{ env.VCPKG_TOOLCHAIN }} -DCMAKE_BUILD_TYPE=Release


      - name: Build
        run: |
          cmake --build ${{github.workspace}}/build