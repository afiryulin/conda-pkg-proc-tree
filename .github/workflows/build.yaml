name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3.3.0
        with:
          activate-environment: ""
          python-version: "3.10"
          auto-activate-base: true
          install-conda-build: true
          extra-specs: |
            anaconda-client


      - name: Build Conda Package
        shell: bash -el {0}
        run: |
            conda info
            conda build conda-recipe --output-folder dist

      - name: Upload Package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: proc-tree-package
          path: dist/linux-64/*.tar.bz2
          # if-no-files-found: error

